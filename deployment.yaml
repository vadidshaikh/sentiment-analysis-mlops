apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentiment-api-deployment
  labels:
    app: sentiment-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sentiment-api
  template:
    metadata:
      labels:
        app: sentiment-api
    spec:
      containers:
      - name: sentiment-api
        image: 565393053877.dkr.ecr.us-east-1.amazonaws.com/sentiment-api:latest
        ports:
        - containerPort: 8000